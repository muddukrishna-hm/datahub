# Trino HTTP Event Listener — ships query events to Elasticsearch for audit.
# The Authorization header is written at container start from secrets/elasticsearch_password.txt.
# Do not add credentials here; they are injected by the Trino entrypoint wrapper.
event-listener.name=http
http-event-listener.connect-ingest-uri=http://elasticsearch:9200/trino-query-audit/_doc
http-event-listener.log-completed=true
http-event-listener.log-created=false
http-event-listener.log-split=false
