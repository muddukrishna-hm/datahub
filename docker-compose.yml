name: datawave-sql-federation

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Data Sources ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: datawave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: datawave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: logistics
      RANGER_DB_PASSWORD: ${RANGER_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datawave -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  mysql:
    image: mysql:8.0
    container_name: datawave-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: inventory
      MYSQL_USER: datawave
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Object Storage + Iceberg ──────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: datawave-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    container_name: datawave-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio/init.sh:/init.sh:ro
    networks:
      - datawave-net

  nessie:
    image: projectnessie/nessie:latest
    container_name: datawave-nessie
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    ports:
      - "19120:19120"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ── User Directory (OpenLDAP) ─────────────────────────────────────────────────

  openldap:
    image: osixia/openldap:1.5.0
    platform: linux/amd64
    container_name: datawave-openldap
    restart: unless-stopped
    command: --copy-service
    environment:
      LDAP_ORGANISATION: DataWave
      LDAP_DOMAIN: datawave.io
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - ./openldap/init:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    ports:
      - "389:389"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -b '' -s base '(objectClass=*)' namingContexts 2>/dev/null | grep -q datawave"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ── SSO Identity Provider (Keycloak) ─────────────────────────────────────────
  # H2 embedded DB (start-dev); no separate keycloak-db required.
  # Realm is imported from keycloak/datawave-realm.json at first boot.
  # Browser-facing port: 8180 → internal: 8080.

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: datawave-keycloak
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/keycloak-start.sh"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
    volumes:
      - ./keycloak/start.sh:/keycloak-start.sh:ro
      - ./keycloak/datawave-realm.json:/tmp/datawave-realm.json.tpl:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8180:8080"
    networks:
      - datawave-net
    depends_on:
      openldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -ne \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q UP' 2>/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging: *default-logging

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    platform: linux/amd64
    container_name: datawave-phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8085:80"
    networks:
      - datawave-net
    depends_on:
      openldap:
        condition: service_healthy
    logging: *default-logging

  # ── SQL Federation Engine (Trino) ─────────────────────────────────────────────
  # start.sh copies config from /etc/trino-source and generates event-listener.properties
  # at startup so the Elasticsearch auth header can be injected from the env.

  trino:
    image: trinodb/trino:458
    container_name: datawave-trino
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/start.sh"]
    environment:
      TRINO_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TRINO_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TRINO_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      nessie:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ranger-sync:
        condition: service_started
    volumes:
      - ./trino/etc:/etc/trino-source:ro
      - ./trino/start.sh:/start.sh:ro
      - ranger_sync:/etc/ranger-sync
    ports:
      - "8080:8080"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # ── Authorization Engine (Apache Ranger) ──────────────────────────────────────
  # Ranger uses the shared postgres instance (separate 'ranger' database).
  # Policy enforcement is file-based (rules.json); Ranger serves as the policy UI.

  ranger-solr:
    image: apache/ranger-solr:2.8.0
    platform: linux/amd64
    container_name: datawave-ranger-solr
    restart: unless-stopped
    command: solr-precreate ranger_audits /opt/solr/server/solr/configsets/ranger_audits/
    ports:
      - "8983:8983"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8983/solr/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  ranger:
    image: apache/ranger:2.8.0
    platform: linux/amd64
    container_name: datawave-ranger
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./ranger/scripts/entrypoint.sh:/entrypoint.sh:ro
    environment:
      RANGER_DB_TYPE: postgres
      RANGER_DB_HOST: postgres
      RANGER_DB_PORT: "5432"
      RANGER_DB_NAME: ranger
      RANGER_DB_USER: rangeradmin
      RANGER_DB_PASSWORD: ${RANGER_DB_PASSWORD}
      POSTGRES_SUPERUSER: datawave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RANGER_ADMIN_PASSWORD: ${RANGER_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      ranger-solr:
        condition: service_healthy
    ports:
      - "6080:6080"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6080/login.jsp"]
      interval: 30s
      timeout: 20s
      retries: 15
      start_period: 180s
    logging: *default-logging

  # ── LDAP → Ranger User/Group Sync ────────────────────────────────────────────
  # Polls OpenLDAP every 60s and upserts users/groups into Ranger Admin via the
  # xusers REST API — replicating what the native Ranger UserSync daemon does.

  ranger-usersync:
    build: ./ranger/usersync
    container_name: datawave-ranger-usersync
    restart: unless-stopped
    environment:
      RANGER_URL: http://ranger:6080
      RANGER_USER: admin
      RANGER_PASS: ${RANGER_ADMIN_PASSWORD}
      LDAP_URL: ldap://openldap:389
      LDAP_BIND_DN: cn=admin,dc=datawave,dc=io
      LDAP_BIND_PASS: ${LDAP_ADMIN_PASSWORD}
      LDAP_USER_BASE: ou=users,dc=datawave,dc=io
      LDAP_GROUP_BASE: ou=groups,dc=datawave,dc=io
      SYNC_INTERVAL: "60"
    networks:
      - datawave-net
    depends_on:
      ranger:
        condition: service_healthy
      openldap:
        condition: service_healthy
    logging: *default-logging

  # ── Ranger → Trino Policy Sync ───────────────────────────────────────────────
  # Polls Ranger REST API every 30s, converts policies → rules.json on the
  # ranger_sync volume. Trino reloads the file automatically (refresh-period=30s).

  ranger-sync:
    build: ./ranger/sync
    container_name: datawave-ranger-sync
    restart: unless-stopped
    environment:
      RANGER_URL: http://ranger:6080
      RANGER_USER: admin
      RANGER_PASS: ${RANGER_ADMIN_PASSWORD}
      RANGER_SERVICE: datawave_trino
      OUTPUT_FILE: /sync/rules.json
      SYNC_INTERVAL: "30"
    volumes:
      - ranger_sync:/sync
    networks:
      - datawave-net
    logging: *default-logging

  # ── Audit Store (Elasticsearch + Kibana) ──────────────────────────────────────

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: datawave-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=datawave-audit
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 60s
    logging: *default-logging

  es-init:
    image: curlimages/curl:latest
    container_name: datawave-es-init
    restart: "no"
    entrypoint: ["/bin/sh", "/es-init.sh"]
    environment:
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./elasticsearch/es-init.sh:/es-init.sh:ro
    networks:
      - datawave-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: kibana:8.13.0
    container_name: datawave-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    ports:
      - "5601:5601"
    networks:
      - datawave-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    logging: *default-logging

  kibana-init:
    image: curlimages/curl:latest
    container_name: datawave-kibana-init
    restart: "no"
    entrypoint: ["/bin/sh", "/kibana-init.sh"]
    environment:
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./elasticsearch/kibana-init.sh:/kibana-init.sh:ro
    networks:
      - datawave-net
    depends_on:
      kibana:
        condition: service_healthy

  # ── BI / SQL Interface (Apache Superset) ──────────────────────────────────────
  # Authenticates via Keycloak OIDC; passes logged-in username to Trino for RBAC.

  superset-init:
    build: ./superset
    container_name: datawave-superset-init
    restart: "no"
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_OIDC_SECRET: ${SUPERSET_OIDC_SECRET}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      PYTHONPATH: /app/pythonpath
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/init.sh:/init.sh:ro
      - ./superset/datasources.yaml:/datasources.yaml:ro
    networks:
      - datawave-net
    logging: *default-logging

  superset:
    build: ./superset
    container_name: datawave-superset
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
      trino:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_OIDC_SECRET: ${SUPERSET_OIDC_SECRET}
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      PYTHONPATH: /app/pythonpath
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    ports:
      - "8088:8088"
    networks:
      - datawave-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    logging: *default-logging

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  datawave-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  mysql_data:
  minio_data:
  es_data:
  openldap_data:
  openldap_config:
  keycloak_data:
  superset_home:
  ranger_sync:
