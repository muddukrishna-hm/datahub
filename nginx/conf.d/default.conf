server {
    listen 80;
    server_name localhost;

    # ── Root: SSO gate → Metabase analytics portal ────────────────────────────
    # All requests to / pass through oauth2-proxy which enforces Keycloak login.
    # After SSO, oauth2-proxy proxies the request upstream to Metabase (:3000).
    # Metabase still requires its own login (free tier has no OIDC SSO), so users
    # authenticate twice: once with Keycloak, once with their Metabase account.
    location /oauth2/ {
        proxy_pass         http://oauth2_proxy;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://oauth2_proxy;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Trino Web UI ───────────────────────────────────────────────────────────
    # Trino's /ui/ redirects back to its own port (8080); rewrite those to /trino/.
    location /trino/ {
        proxy_pass         http://trino/ui/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     ~^http://[^/]+:8080/ui/ /trino/;
    }

    # Trino API — the /ui/ JS makes calls to /v1/ and /ui/ paths
    location ~ ^/(v1|ui)/ {
        proxy_pass         http://trino;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     ~^http://[^/]+:8080/ /trino/;
    }

    # ── Apache Ranger Admin UI ─────────────────────────────────────────────────
    # Ranger's React bundle uses "../images/…" paths. From /ranger/ the browser
    # resolves those to http://localhost/images/ (Metabase). Rewrite every JS chunk
    # to "/ranger/images/…" and keep a root /images/ fallback for cached bundles.
    location ~ ^/ranger/dist/(.+\.js)$ {
        proxy_pass         http://ranger/dist/$1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Accept-Encoding   "";
        add_header         Cache-Control     "no-cache";
        sub_filter_types   application/javascript text/javascript;
        sub_filter_once    off;
        sub_filter         '"../images/' '"/ranger/images/';
        sub_filter         "'../images/" "'/ranger/images/";
    }

    location /ranger/ {
        proxy_pass         http://ranger/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     http://localhost/  /ranger/;
    }

    # Fallback when cached JS still resolves ../images/ to the site root.
    location /images/ {
        proxy_pass         http://ranger/images/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── MinIO Console ──────────────────────────────────────────────────────────
    # Console is served on a subpath; strip /minio/ before proxying to :9001.
    # MINIO_CONSOLE_SUBPATH tells the console to emit /minio/ in asset/API URLs.
    location /minio/ {
        rewrite            ^/minio/(.*) /$1 break;
        proxy_pass         http://minio_console;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        chunked_transfer_encoding off;
        proxy_set_header   Accept-Encoding   "";
        sub_filter_types   text/html;
        sub_filter_once    off;
        sub_filter         '<base href="/"/>' '<base href="/minio/"/>';
    }

    # ── Kibana (Audit logs viewer) ─────────────────────────────────────────────
    # Pass the full /kibana/ URI to Kibana (SERVER_BASEPATH=/kibana). Do not append
    # a URI suffix to proxy_pass when using a variable — that breaks path routing.
    location /kibana/ {
        resolver           127.0.0.11 valid=5s;
        set                $kibana_upstream kibana:5601;
        proxy_pass         http://$kibana_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
